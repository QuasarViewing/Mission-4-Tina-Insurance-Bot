<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tina — Insurance Consultant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Tina</h1>
      <p class="subtitle">Your AI Insurance Consultant</p>
    </div>

    <div id="conversation" class="conversation-box">
      <!-- Messages will appear here -->
    </div>

    <div class="input-section">
      <input type="text" id="userInput" placeholder="Type your response here..." />
      <button type="button" id="submitBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
